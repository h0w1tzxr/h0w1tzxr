name: Metrics

on:
  schedule:
    - cron: "0 0 * * 0" # weekly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: h0w1tzxr

          template: classic
          filename: github-metrics.svg

          config_timezone: Asia/Jakarta
          config_display: large
          config_animations: no
          config_padding: 6, 12%
          config_order: base.header, isocalendar, languages, lines
          
          base: header
          base_indepth: no
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_details: percentage

          plugin_lines: yes

          extras_css: |
            /* ==== Core palette ==== */
            svg { background:#0d1117 !important; }
            text { fill:#c9d1d9 !important; }
            .separator, .divider { opacity:.14 !important; }

            /* Kill GitHub-blue accents -> cyber green */
            a, .url { fill:#39d353 !important; }
            [fill="#58a6ff"], [fill="#1f6feb"], [fill="#0969da"] { fill:#39d353 !important; }
            [stroke="#58a6ff"], [stroke="#1f6feb"], [stroke]()
