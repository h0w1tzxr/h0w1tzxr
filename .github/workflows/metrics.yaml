name: Metrics (HTB Dark Green)

on:
  schedule:
    - cron: "0 0 * * 0" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate metrics (terminal theme)
        uses: lowlighter/metrics@latest
        with:
          user: h0w1tzxr
          token: ${{ secrets.GITHUB_TOKEN }}
          template: terminal
          filename: github-metrics.svg
          
          config_timezone: Asia/Jakarta
          config_display: large

          base: header, activity, repositories

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          plugin_lines: yes

          plugin_followup: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

          config_theme: dark
          extras_css: |
            /* HTB-ish: dark bg + cyber green headings */
            :root { --htb-green: #39d353; --bg: #0d1117; --fg: #c9d1d9; }
            body, .container { background: var(--bg) !important; }
            h1, h2, h3, .field h2, .field h3 { color: var(--htb-green) !important; }
            .field, .label, text { fill: var(--fg) !important; color: var(--fg) !important; }
            a, .url { color: var(--htb-green) !important; }
            .separator { opacity: 0.25 !important; }
            /* Many charts use strokes/fills; this helps “greenify” them */
            .chart, .chart * { stroke: var(--htb-green) !important; }
            .progress, .progress * { stroke: var(--htb-green) !important; fill: var(--htb-green) !important; }

      - name: Commit & push (main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          git commit -m "chore: update github metrics" || exit 0
          git push
