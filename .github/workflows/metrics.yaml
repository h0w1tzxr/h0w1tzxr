name: Metrics

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate terminal-like metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: h0w1tzxr

          template: terminal
          filename: github-metrics.svg

          config_timezone: Asia/Jakarta
          config_display: large
          config_animations: no
          config_padding: 0, 10%

          base: header, activity, repositories
          base_indepth: no
          
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_details: percentage

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_lines: yes

          extras_css: |
            /* Dark + cyber green */
            svg { background:#0d1117 !important; }
            text { fill:#c9d1d9 !important; }
            a, .url { fill:#39d353 !important; }

            /* Emphasize headings / section labels */
            h1, h2, h3, .field h2, .field h3 { fill:#39d353 !important; }

            /* Subtle separators */
            .separator, .divider { opacity:.18 !important; }

      - name: Commit & push (main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          git commit -m "chore: update metrics" || exit 0
          git push
