name: Generate Snake (dark -> main)

on:
  schedule:
    - cron: "0 0 * * 0" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate dark snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: h0w1tzxr
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#39d353&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Move to main branch (assets)
        run: |
          mkdir -p assets
          cp dist/github-snake.svg assets/github-snake.svg

      - name: Commit and push (main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg
          git commit -m "chore: update snake svg" || exit 0
          git push
